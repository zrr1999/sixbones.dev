name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install and Build 🔧
        run: |
          pnpm install
          pnpm run build
      - name: Create blog domain branch 🌿
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/blog/dist/
          publish_branch: blog
          force_orphan: true
          commit_message: ":rocket: deploy: "
          user_name: "github-actions"
          user_email: "github-actions@github.com"
      - name: Create slides domain branch 🌿
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/slides/dist/
          publish_branch: slides
          force_orphan: true
          commit_message: ":rocket: deploy: "
          user_name: "github-actions"
          user_email: "github-actions@github.com"
      - name: Create root domain branch 🌿
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/root/dist/
          publish_branch: root
          force_orphan: true
          commit_message: ":rocket: deploy: "
          user_name: "github-actions"
          user_email: "github-actions@github.com"
